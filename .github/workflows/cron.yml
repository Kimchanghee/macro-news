name: Cron - Trigger /api/cron/collect every 5 minutes

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Hit Vercel cron endpoint
        run: |
          if [ -z "${SITE_URL}" ]; then
            echo "SITE_URL secret missing - skip."
            exit 0
          fi
          curl --fail-with-body --silent --show-error -H "Authorization: Bearer ${CRON_SECRET}" "${SITE_URL}/api/cron/collect" || (echo cronfail; exit 1)
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
