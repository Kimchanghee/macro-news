name: Content - Codex CLI 矛陆聵铆聟聬矛赂聽 矛聻聬毛聫聶 矛聝聺矛聞卤/矛聺麓毛炉赂矛搂聙/矛禄陇毛掳聥

on:
  schedule:
    # ChatGPT Pro 锚碌卢毛聫聟: 5毛露聞 锚掳聞锚虏漏 (rate-limit 矛露漏毛露聞)
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      max_articles:
        description: '矛聺麓毛虏聢 矛聥陇铆聳聣矛聴聬矛聞聹 矛聝聢毛隆聹 矛聝聺矛聞卤铆聲聽 锚赂掳矛聜卢 矛碌聹毛聦聙 锚掳聹矛聢聵'
        required: false
        default: '3'

permissions:
  contents: write

concurrency:
  group: codex-content
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore Codex auth (ChatGPT 锚碌卢毛聫聟)
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: |
          if [ -z "$CODEX_AUTH_JSON" ]; then
            echo "::error::CODEX_AUTH_JSON secret 矛聴聠矛聺聦"
            exit 1
          fi
          mkdir -p ~/.codex
          printf '%s' "$CODEX_AUTH_JSON" > ~/.codex/auth.json
          chmod 600 ~/.codex/auth.json
          echo "auth.json restored ($(wc -c < ~/.codex/auth.json) bytes)"

      - name: Install Codex CLI
        run: |
          npm i -g @openai/codex
          codex --version

      - name: Verify Codex auth
        run: |
          set -e
          OUT=$(codex exec --json --sandbox read-only --skip-git-repo-check "Reply with the single word: ok" 2>&1 || true)
          echo "$OUT" | head -50
          if echo "$OUT" | grep -qi "auth\|login\|expired\|unauthorized"; then
            echo "::error::Codex 矛聺赂矛娄聺 矛聥陇铆聦篓"
            exit 1
          fi

      - name: Install repo deps
        run: npm install --legacy-peer-deps

      - name: Generate content via codex
        env:
          MAX_ARTICLES: ${{ inputs.max_articles || '1' }}
        run: node scripts/codex-cron.mjs

      - name: Commit & push if changed (with rebase retry)
        shell: bash
        run: |
          set +e
          echo "=== pwd ==="
          pwd
          echo "=== ls data/articles ==="
          ls -la data/articles/ 2>&1 | head -30 || echo "(no articles dir)"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/ public/images/ 2>&1
          STAGED=$(git diff --cached --name-only | head -100)
          if [ -z "$STAGED" ]; then
            echo "毛鲁聙锚虏陆 矛聴聠矛聺聦 芒聙聰 skip commit"
            exit 0
          fi
          COUNT=$(echo "$STAGED" | grep -c 'data/articles/' || echo 0)
          echo "=== git commit (COUNT=$COUNT) ==="
          git commit -m "[bot] codex: ${COUNT}锚掳聹 锚赂掳矛聜卢 矛聝聺矛聞卤"
          
          # Retry push with rebase up to 3 times
          for i in 1 2 3; do
            echo "=== push attempt $i ==="
            git pull --rebase origin main 2>&1 | tail -10
            git push 2>&1
            if [ $? -eq 0 ]; then
              echo "芒聹聯 pushed on attempt $i"
              exit 0
            fi
            echo "push attempt $i failed, retrying..."
            sleep 5
          done
          echo "::error::all push attempts failed"
          exit 1
