name: Content - Codex CLI 矛陆聵铆聟聬矛赂聽 矛聻聬毛聫聶 矛聝聺矛聞卤/矛聺麓毛炉赂矛搂聙/矛禄陇毛掳聥

on:
  schedule:
    # ChatGPT 锚碌卢毛聫聟 rate-limit 毛鲁麓铆聵赂: 1矛聥聹锚掳聞 锚掳聞锚虏漏 (5毛露聞矛聺聙 Plus 铆聲聹毛聫聞 矛麓聢锚鲁录)
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      max_articles:
        description: '矛聺麓毛虏聢 矛聥陇铆聳聣矛聴聬矛聞聹 矛聝聢毛隆聹 矛聝聺矛聞卤铆聲聽 锚赂掳矛聜卢 矛碌聹毛聦聙 锚掳聹矛聢聵'
        required: false
        default: '3'

permissions:
  contents: write   # data/, public/images/ 矛禄陇毛掳聥 push

concurrency:
  group: codex-content
  cancel-in-progress: false   # 矛搂聞铆聳聣 矛陇聭矛聺麓毛漏麓 毛聥陇矛聺聦 铆聤赂毛娄卢锚卤掳 铆聛聬矛聻聣

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore Codex auth (ChatGPT 锚碌卢毛聫聟)
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: |
          if [ -z "$CODEX_AUTH_JSON" ]; then
            echo "::error::CODEX_AUTH_JSON secret 矛聴聠矛聺聦. README矛聺聵 setup 矛聞鹿矛聟聵 矛掳赂锚鲁聽."
            exit 1
          fi
          mkdir -p ~/.codex
          printf '%s' "$CODEX_AUTH_JSON" > ~/.codex/auth.json
          chmod 600 ~/.codex/auth.json
          echo "auth.json restored ($(wc -c < ~/.codex/auth.json) bytes)"

      - name: Install Codex CLI
        run: |
          npm i -g @openai/codex
          codex --version

      - name: Verify Codex auth
        run: |
          set -e
          # 矛聻聭矛聺聙 铆聲聭矛聹录毛隆聹 矛聺赂矛娄聺 铆聶聲矛聺赂 (矛聺聭毛聥碌矛聺麓 矛搂搂矛聺聦)
          OUT=$(codex exec --json --sandbox read-only --skip-git-repo-check "Reply with the single word: ok" 2>&1 || true)
          echo "$OUT" | head -50
          if echo "$OUT" | grep -qi "auth\|login\|expired\|unauthorized"; then
            echo "::error::Codex 矛聺赂矛娄聺 矛聥陇铆聦篓 芒聙聰 auth.json 毛搂聦毛拢聦/铆職聦矛聽聞 锚掳聙毛聤楼. 毛隆聹矛禄卢矛聴聬矛聞聹 'codex login' 毛聥陇矛聥聹 矛聥陇铆聳聣 铆聸聞 secret 矛聻卢矛聴聟毛隆聹毛聯聹 铆聲聞矛職聰."
            exit 1
          fi

      - name: Install repo deps
        run: npm install --legacy-peer-deps

      - name: Generate content via codex
        env:
          MAX_ARTICLES: ${{ inputs.max_articles || '3' }}
        run: node scripts/codex-cron.mjs

      - name: Commit & push if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/ public/images/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "毛鲁聙锚虏陆 矛聴聠矛聺聦 芒聙聰 矛聥聽锚路聹 锚赂掳矛聜卢 0锚卤麓"
          else
            COUNT=$(git diff --cached --name-only | grep -c 'data/articles/' || true)
            git commit -m "[bot] codex: ${COUNT}锚掳聹 锚赂掳矛聜卢 矛聝聺矛聞卤 + 矛聺麓毛炉赂矛搂聙"
            git push
          fi
