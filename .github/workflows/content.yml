name: Content - Codex CLI 콘텐츠 자동 생성/이미지/커밋

on:
  schedule:
    # ChatGPT Pro 구독: 5분 간격 (rate-limit 충분)
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      max_articles:
        description: '이번 실행에서 새로 생성할 기사 최대 개수'
        required: false
        default: '3'

permissions:
  contents: write

concurrency:
  group: codex-content
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore Codex auth (ChatGPT 구독)
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: |
          if [ -z "$CODEX_AUTH_JSON" ]; then
            echo "::error::CODEX_AUTH_JSON secret 없음"
            exit 1
          fi
          mkdir -p ~/.codex
          printf '%s' "$CODEX_AUTH_JSON" > ~/.codex/auth.json
          chmod 600 ~/.codex/auth.json
          echo "auth.json restored ($(wc -c < ~/.codex/auth.json) bytes)"

      - name: Install Codex CLI
        run: |
          npm i -g @openai/codex
          codex --version

      - name: Verify Codex auth
        run: |
          set -e
          OUT=$(codex exec --json --sandbox read-only --skip-git-repo-check "Reply with the single word: ok" 2>&1 || true)
          echo "$OUT" | head -50
          if echo "$OUT" | grep -qi "auth\|login\|expired\|unauthorized"; then
            echo "::error::Codex 인증 실패"
            exit 1
          fi

      - name: Install repo deps
        run: npm install --legacy-peer-deps

      - name: Generate content via codex
        env:
          MAX_ARTICLES: ${{ inputs.max_articles || '3' }}
          TARGET_BODY_MIN: '1000'
          TARGET_BODY_MAX: '1200'
          MAX_KO_REPAIR_RETRIES: '2'
          CODEX_TIMEOUT_MS: '900000'
          GENERATE_ALL_LOCALES: '0'
        run: node scripts/codex-cron.mjs

      - name: Freshness guard (48h window + stale alert)
        env:
          FRESH_WINDOW_HOURS: '48'
          MIN_FRESH_ARTICLES_48H: '1'
          STALE_HOURS: '36'
          FAIL_ON_STALE: '1'
        run: node scripts/freshness-check.mjs

      - name: Commit & push if changed (with rebase retry)
        shell: bash
        run: |
          set +e
          echo "=== pwd ==="
          pwd
          echo "=== ls data/articles ==="
          ls -la data/articles/ 2>&1 | head -30 || echo "(no articles dir)"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/ public/images/ reports/ 2>&1
          STAGED=$(git diff --cached --name-only | head -100)
          if [ -z "$STAGED" ]; then
            echo "변경 없음 — skip commit"
            exit 0
          fi
          COUNT=$(echo "$STAGED" | grep -c 'data/articles/' || echo 0)
          echo "=== git commit (COUNT=$COUNT) ==="
          git commit -m "[bot] codex: ${COUNT}개 기사 생성"
          
          # Retry push with rebase up to 3 times
          for i in 1 2 3; do
            echo "=== push attempt $i ==="
            git pull --rebase origin main 2>&1 | tail -10
            git push 2>&1
            if [ $? -eq 0 ]; then
              echo "✓ pushed on attempt $i"
              exit 0
            fi
            echo "push attempt $i failed, retrying..."
            sleep 5
          done
          echo "::error::all push attempts failed"
          exit 1
