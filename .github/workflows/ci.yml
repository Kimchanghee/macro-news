name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --legacy-peer-deps
      - run: npx tsc --noEmit
        continue-on-error: true
      - run: npm run build
        env:
          NEXT_PUBLIC_ADSTERRA_POPUNDER_KEY: ${{ secrets.NEXT_PUBLIC_ADSTERRA_POPUNDER_KEY || '' }}
